name: WordPress Compatibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  activation-test:
    name: WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        wordpress: ['6.0', '6.4', '6.5', '6.6', 'latest']
        php: ['7.4', '8.0', '8.1', '8.2']
        exclude:
          - wordpress: '6.0'
            php: '8.2'

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, openssl, curl, json
          tools: wp-cli

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h"127.0.0.1" -P3306 -uroot -proot --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL..."
            sleep 1
          done

      - name: Download WordPress ${{ matrix.wordpress }}
        run: |
          mkdir -p /tmp/wordpress
          cd /tmp/wordpress
          wp core download --version=${{ matrix.wordpress }} --allow-root

      - name: Configure WordPress
        run: |
          cd /tmp/wordpress
          wp config create \
            --dbname=wordpress_test \
            --dbuser=root \
            --dbpass=root \
            --dbhost=127.0.0.1:3306 \
            --allow-root
          wp core install \
            --url=http://localhost \
            --title="CI Test Site" \
            --admin_user=admin \
            --admin_password=admin \
            --admin_email=ci@example.com \
            --skip-email \
            --allow-root

      - name: Install plugin
        run: |
          cp -r $GITHUB_WORKSPACE/plugin-src /tmp/wordpress/wp-content/plugins/ai-chat-assistant
          # Remove dev files from the plugin copy
          rm -rf /tmp/wordpress/wp-content/plugins/ai-chat-assistant/.git
          rm -rf /tmp/wordpress/wp-content/plugins/ai-chat-assistant/.github
          rm -rf /tmp/wordpress/wp-content/plugins/ai-chat-assistant/.claude

      - name: Activate plugin
        run: |
          cd /tmp/wordpress
          wp plugin activate ai-chat-assistant --allow-root

      - name: Verify plugin is active
        run: |
          cd /tmp/wordpress
          wp plugin list --status=active --format=csv --allow-root | grep -q "ai-chat-assistant" \
            || (echo "Plugin not active!" && exit 1)
          echo "Plugin activated successfully on WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}"

      - name: Check for PHP errors
        run: |
          cd /tmp/wordpress
          # Trigger admin pages to surface fatal errors
          wp eval 'echo "Plugin loaded OK";' --allow-root
          # Check debug log if WP_DEBUG was on
          if [ -f wp-content/debug.log ]; then
            echo "=== debug.log ==="
            cat wp-content/debug.log
          fi

      - name: Deactivate and re-activate (idempotency check)
        run: |
          cd /tmp/wordpress
          wp plugin deactivate ai-chat-assistant --allow-root
          wp plugin activate ai-chat-assistant --allow-root
